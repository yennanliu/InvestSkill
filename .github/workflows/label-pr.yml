name: Label PRs

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Auto-label based on files changed
      continue-on-error: true  # cosmetic labeling must never block a PR
      uses: actions/labeler@v5
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        configuration-path: .github/labeler.yml
        sync-labels: true

    - name: Label based on PR size
      continue-on-error: true  # cosmetic labeling must never block a PR
      run: |
        PR_NUMBER=${{ github.event.pull_request.number }}
        FILES_CHANGED=$(gh pr view $PR_NUMBER --json files --jq '.files | length')

        echo "Files changed: $FILES_CHANGED"

        if [ "$FILES_CHANGED" -le 5 ]; then
          SIZE="size/small"
        elif [ "$FILES_CHANGED" -le 15 ]; then
          SIZE="size/medium"
        else
          SIZE="size/large"
        fi

        # gh --add-label errors on a label that doesn't exist yet, so
        # create it first (idempotent via --force) before applying it.
        gh label create "$SIZE" --color ededed --force >/dev/null 2>&1 || true
        gh pr edit "$PR_NUMBER" --add-label "$SIZE" || true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
